    /* --------------------------------------------------------------
       Icon helpers and accessibility classes
       These classes are used throughout the UI to embed small icons
       next to labels. They ensure proper alignment and spacing for
       both RTL and LTR directions. Icons appear after the text in
       the DOM (due to RTL) but margin-inline-start will add space
       between label and icon regardless of direction.
    -------------------------------------------------------------- */

      font-size: 1.2rem;
      margin-inline-start: 0.4rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;

        <div id="waiterBody" class="collapse-body"><div id="waiterContainer"></div><button class="btn secondary" onclick="addShiftWorker('waiter')">הוספה</button></div>

        <div id="resultsMacro" class="kpi-grid"></div>
        <div class="divider"></div>
        <h3>מלצרים</h3>
        <div id="waitersResults"></div>
        <div class="divider"></div>
        <h3>ברמנים</h3>
        <div id="barResults"></div>
        <div class="divider"></div>
        <h3>מארחות</h3>
        <div id="hostResults"></div>
        <div class="divider"></div>
        <h3>אחמ״שים</h3>

    <section id="employeesView" class="view">
      <div class="card">

        <div class="grid">
          <div><label for="empId">מס׳ עובד</label><input id="empId" type="text" inputmode="numeric" placeholder="לדוגמה 123"></div>
          <div><label for="empName">שם</label><input id="empName" type="text" placeholder="שם מלא"></div>
          <div>
            <label>תפקידים</label>

          </div>
          <div><label for="empDefaultStars">כוכבים</label><select id="empDefaultStars"><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6" selected>6</option></select></div>

          <div><label for="monthPicker">חודש</label><input id="monthPicker" type="month" onchange="renderMonth()"></div>
          <!-- Removed explicit role filter. Role is always treated as "all" -->
          <!-- <div><label for="roleFilter">סינון</label><select id="roleFilter" onchange="renderMonth()"><option value="all">כולם</option><option value="waiter">מלצרים</option><option value="bar">ברמנים</option></select></div> -->
          <div><label for="monthSearch">חיפוש</label><input id="monthSearch" type="text" placeholder="שם או מס׳ עובד" oninput="renderMonth()"></div>
        </div>
        <div class="row" style="margin-top:10px"><button class="btn secondary" onclick="exportMonthCsv()">ייצוא חודש CSV</button><button class="btn secondary" onclick="exportAlertsCsv()">ייצוא חריגות CSV</button><button class="btn secondary" onclick="printMonthReport()">דוח להדפסה</button><button id="closeMonthBtn" class="btn danger" onclick="toggleMonthClosed()">סגור חודש</button></div>
      </div>
      <div class="card"><h2>סיכום חודשי</h2><div id="monthStatus" class="pill hidden"></div><div id="monthMacro" class="kpi-grid" style="margin-top:10px"></div><div id="monthAlerts"></div><div id="monthWorkers"></div></div>

      <div class="card"><h2>גיבוי וייבוא</h2><div class="row"><button class="btn secondary" onclick="exportBackupJson()">ייצוא גיבוי מלא</button><label class="btn secondary" style="display:flex;align-items:center;justify-content:center;margin:0;cursor:pointer">בחר קובץ ייבוא<input id="backupFile" type="file" accept="application/json,.json" class="hidden" onchange="previewImportFile(event)"></label></div><div id="importPreview" style="margin-top:12px"></div></div>

  <div class="fab"><button class="btn" onclick="calculateAndRender(true)">חשב</button><button class="btn secondary" onclick="saveDay()">שמור</button></div>
  <div id="toast" class="toast"></div>
  <div id="printArea" class="print-area"></div>

<script>
const LS_EMPLOYEES='tipCalcEmployees.v3';
const LS_DAYS='tipCalcDays.v4';
const LS_CLOSED='tipCalcClosedMonths.v1';
const BAR_WEEK=0.12;
const BAR_WEEKEND=0.15;

let employees=loadJson(LS_EMPLOYEES,[]);
let days=loadJson(LS_DAYS,[]);
let closedMonths=loadJson(LS_CLOSED,[]);
// Track indices for each role when adding shift workers. Added hostIdx and managerIdx for hosts and shift managers
let barIdx=0, waiterIdx=0, hostIdx=0, managerIdx=0, editingEmployeeId=null, loadedDayId=null, lastCalculation=null, pendingImport=null;

const fmt=n=>new Intl.NumberFormat('he-IL',{style:'currency',currency:'ILS',maximumFractionDigits:0}).format(Math.floor(Number(n)||0));
const pad2=n=>String(n).padStart(2,'0');
const todayISO=()=>{const d=new Date();return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`};
const monthISO=()=>todayISO().slice(0,7);
const roundMoney=n=>Math.round((Number(n)+Number.EPSILON)*100)/100;
const floorMoney=n=>Math.floor(Math.max(0,Number(n)||0)+Number.EPSILON);
const monthOfDate=d=>String(d||'').slice(0,7);
const escapeHTML=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
const escapeAttr=escapeHTML;
const normalizeId=id=>String(id||'').trim();
const roleOrder=['waiter','bar','host','manager'];
const employeeUid=()=>`e_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;
const employeeKey=e=>String(e?.uid||e?.id||e?.name||'');
const employeeOptionValue=e=>`${e.name}${e.id?' · '+e.id:' · '+employeeKey(e).slice(-6)}`;
function getEmployeeByKey(key){const k=String(key||'');if(!k)return null;return employees.find(e=>employeeKey(e)===k)||null}

window.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('workDate').value = todayISO();
  document.getElementById('monthPicker').value = monthISO();
  // run migrations
  migrateData();
  // initial workers
  addShiftWorker('bar');
  addShiftWorker('waiter');
  // auto detect weekend based on the default date
  autoSetWeekend();
  toggleWeekendState();
  // render views
  renderEmployees();
  renderDays();
  renderMonth();
  // attach listener to update weekend automatically when date changes
  const dateInput = document.getElementById('workDate');
  if(dateInput){
    dateInput.addEventListener('change', () => {
      autoSetWeekend();
      toggleWeekendState();
    });
  }
});

function loadJson(key,fallback){try{return JSON.parse(localStorage.getItem(key))??fallback}catch{return fallback}}
function saveJson(key,value){localStorage.setItem(key,JSON.stringify(value))}
function persist(){saveJson(LS_EMPLOYEES,employees);saveJson(LS_DAYS,days);saveJson(LS_CLOSED,closedMonths)}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>el.classList.remove('show'),2400)}
function getEmployeeById(id){const value=String(id||'');if(!value)return null;return employees.find(e=>String(e.id)===value)||null}
function roleText(role){
  // Translate internal role identifiers to Hebrew text. Return empty string when no role.
  if(role==='bar') return 'ברמן';
  if(role==='waiter') return 'מלצר';
  if(role==='both') return 'גם וגם';
  if(role==='host') return 'מארחת';
  if(role==='manager') return 'אחמ״ש';
  return '';
}
function isMonthClosed(month){return closedMonths.some(m=>m.month===month)}
function migrateData(){
  let changed=false;
  employees=employees.map(e=>{
    const next={...e};
    if(!next.uid){next.uid=employeeUid();changed=true}
    if(next.active===undefined){next.active=true;changed=true}
    return next;
  });
  days=days.map(d=>{
    const workers=(d.workers||[]).map(w=>{
      if(w.empUid) return w;
      const match=getEmployeeById(w.empId)||employees.find(e=>String(e.name)===String(w.nameSnapshot||w.name));
      if(match){changed=true;return {...w,empUid:employeeKey(match)}}
      return w;
    });
    const next={...d,workers};
    if(next.locked===undefined){next.locked=true;next.editCount=next.editCount||0;changed=true}
    if(next.hostHours===undefined){next.hostHours=roundMoney(workers.filter(w=>w.role==='host').reduce((s,w)=>s+Number(w.hours||0),0));changed=true}
    if(next.managerHours===undefined){next.managerHours=roundMoney(workers.filter(w=>w.role==='manager').reduce((s,w)=>s+Number(w.hours||0),0));changed=true}
    return next;
  });
  if(changed)persist();
}
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.view===id));if(id==='employeesView')renderEmployees();if(id==='journalView')renderDays();if(id==='monthView')renderMonth()}
function toggleCollapse(id){document.getElementById(id).classList.toggle('collapsed')}
function toggleWeekendState(){const enabled=document.getElementById('enableBarCut').checked;const weekend=document.getElementById('isWeekend');const wrapper=document.getElementById('weekendWrapper');if(!enabled){weekend.checked=false;weekend.disabled=true;wrapper.classList.add('disabled-option')}else{weekend.disabled=false;wrapper.classList.remove('disabled-option')}}

// Automatically set weekend checkbox based on the selected date.
function autoSetWeekend(){
  const dateStr = document.getElementById('workDate').value || '';
  if(!dateStr) return;
  const [year,month,dayOfMonth] = dateStr.split('-').map(Number);
  const d = new Date(year, month - 1, dayOfMonth);
  const day = d.getDay(); // 0 Sunday, 1 Monday, ..., 5 Friday, 6 Saturday
  const weekend = (day === 5 || day === 6);
  // Only update the checkbox if bar cut is enabled; weekend selection is disabled when bar cut is off
  document.getElementById('isWeekend').checked = weekend;
}

function saveEmployee(){
  const id = normalizeId(document.getElementById('empId').value);
  const name = document.getElementById('empName').value.trim();
  // derive default role from checkboxes (waiter/bar). allow multiple roles
  const waiter = document.getElementById('empRoleWaiter').checked;
  const bar = document.getElementById('empRoleBar').checked;
  const host = document.getElementById('empRoleHost')?.checked;
  const manager = document.getElementById('empRoleManager')?.checked;
  // determine defaultRole: host/manager take precedence, then waiter+bar, then individual waiter or bar
  let defaultRole = '';
  if (host) defaultRole = 'host';
  else if (manager) defaultRole = 'manager';
  else if (waiter && bar) defaultRole = 'both';
  else if (waiter) defaultRole = 'waiter';
  else if (bar) defaultRole = 'bar';
  else defaultRole = '';
  // set default stars only for waiter/bar roles; hosts and managers ignore star rating (still stored but unused)
  let defaultStars = Number(document.getElementById('empDefaultStars').value) || 6;
  if (defaultRole === 'host' || defaultRole === 'manager') {
    defaultStars = 6;
  }
  const active = document.getElementById('empActive').checked;
  // require only a name; id is optional
  if (!name) {
    toast('חסר שם');
    return;
  }
  // check duplicate id only when id exists
  if (id) {
    const duplicate = employees.find(e => String(e.id) === String(id) && employeeKey(e) !== String(editingEmployeeId));
    if (duplicate) {
      toast('מס׳ עובד כבר קיים');
      return;
    }
  }
  const previous = editingEmployeeId ? getEmployeeByKey(editingEmployeeId) : null;
  const record = {
    uid: previous?.uid || employeeUid(),
    id,
    name,
    defaultRole,
    defaultStars,
    active,
    createdAt: previous?.createdAt || new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  if (editingEmployeeId) {
    employees = employees.map(e => employeeKey(e) === String(editingEmployeeId) ? record : e);
    editingEmployeeId = null;
  } else {
    employees.push(record);
  }
  employees.sort((a,b) => String(a.name).localeCompare(String(b.name),'he'));
  saveJson(LS_EMPLOYEES, employees);
  resetEmployeeForm();
  renderEmployees();
  refreshEmployeeLists();
  toast('העובד נשמר');
}
function editEmployee(id){
  const e = getEmployeeByKey(id);
  if (!e) return;
  editingEmployeeId = employeeKey(e);
  document.getElementById('empId').value = e.id || '';
  document.getElementById('empName').value = e.name || '';
  // set role checkboxes based on defaultRole
  const role = e.defaultRole || '';
  document.getElementById('empRoleWaiter').checked = (role === 'waiter' || role === 'both');
  document.getElementById('empRoleBar').checked = (role === 'bar' || role === 'both');
  document.getElementById('empRoleHost').checked = (role === 'host');
  document.getElementById('empRoleManager').checked = (role === 'manager');
  document.getElementById('empDefaultStars').value = e.defaultStars || 6;
  document.getElementById('empActive').checked = e.active !== false;
  document.getElementById('saveEmployeeBtn').textContent = 'עדכן עובד';
  showView('employeesView');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
function setEmployeeActive(id,active){const e=getEmployeeByKey(id);if(!e)return;e.active=active;e.updatedAt=new Date().toISOString();saveJson(LS_EMPLOYEES,employees);renderEmployees();refreshEmployeeLists();toast(active?'העובד הופעל':'העובד הוגדר לא פעיל')}
function resetEmployeeForm(){
  editingEmployeeId = null;
  document.getElementById('empId').value = '';
  document.getElementById('empName').value = '';
  // clear role checkboxes
  document.getElementById('empRoleWaiter').checked = false;
  document.getElementById('empRoleBar').checked = false;
  document.getElementById('empRoleHost').checked = false;
  document.getElementById('empRoleManager').checked = false;
  document.getElementById('empDefaultStars').value = '6';
  document.getElementById('empActive').checked = true;
  document.getElementById('saveEmployeeBtn').textContent = 'שמור עובד';
}
function renderEmployees(){
  const q=(document.getElementById('employeeSearch')?.value||'').trim().toLowerCase();
  const filter=document.getElementById('employeeFilter')?.value||'active';
  let list=employees.filter(e=>filter==='all'||(filter==='active'?e.active!==false:e.active===false));
  list=list.filter(e=>!q||String(e.id).includes(q)||String(e.name).toLowerCase().includes(q));
  const target=document.getElementById('employeesList');
  if(!list.length){
    target.innerHTML='<div class="empty">אין עובדים להצגה.</div>';
    return;
  }
  target.innerHTML=list.map(e=>{
    const idPart = e.id ? 'מס׳ '+escapeHTML(e.id)+' · ' : '';
    const roleTextPart = roleText(e.defaultRole);
    const rolePart = roleTextPart ? roleTextPart + ' · ' : '';
    // show star count only for waiter/bar/both roles
    const starPart = (e.defaultRole === 'host' || e.defaultRole === 'manager' || e.defaultRole === '') ? '' : `${e.defaultStars || 6} כוכבים · `;
    const statusPart = e.active===false ? 'לא פעיל' : 'פעיל';
    const key = escapeAttr(employeeKey(e));
    return `<div class="employee-card"><div class="employee-head"><div><div class="employee-title">${escapeHTML(e.name)}</div><div class="employee-sub">${idPart}${rolePart}${starPart}${statusPart}</div></div><div class="employee-actions"><button class="btn secondary small" onclick="editEmployee('${key}')">ערוך</button><button class="btn ${e.active===false?'secondary':'danger'} small" onclick="setEmployeeActive('${key}',${e.active===false?'true':'false'})">${e.active===false?'הפעל':'השבת'}</button></div></div></div>`;
  }).join('');
}

function employeesForRole(role){
  // Return employees eligible for the given role. Hosts and managers are exclusive; both=waiter & bar; empty default treated as both waiter and bar.
  return employees.filter(e=>{
    if(e.active===false) return false;
    const r = e.defaultRole||'';
    if(role==='host') return r==='host';
    if(role==='manager') return r==='manager';
    if(role==='bar') return r==='bar'||r==='both'||r==='';
    if(role==='waiter') return r==='waiter'||r==='both'||r==='';
    return false;
  });
}
function datalistId(role){
  if(role==='bar') return 'barEmployeesList';
  if(role==='waiter') return 'waiterEmployeesList';
  if(role==='host') return 'hostEmployeesList';
  if(role==='manager') return 'managerEmployeesList';
  return '';
}
function renderDatalists(){
  // Build datalists for each role. Values include a stable suffix so duplicate names remain selectable.
  let html = '';
  html += `<datalist id="waiterEmployeesList">${employeesForRole('waiter').map(e=>`<option value="${escapeAttr(employeeOptionValue(e))}"></option>`).join('')}</datalist>`;
  html += `<datalist id="barEmployeesList">${employeesForRole('bar').map(e=>`<option value="${escapeAttr(employeeOptionValue(e))}"></option>`).join('')}</datalist>`;
  html += `<datalist id="hostEmployeesList">${employeesForRole('host').map(e=>`<option value="${escapeAttr(employeeOptionValue(e))}"></option>`).join('')}</datalist>`;
  html += `<datalist id="managerEmployeesList">${employeesForRole('manager').map(e=>`<option value="${escapeAttr(employeeOptionValue(e))}"></option>`).join('')}</datalist>`;
  let holder = document.getElementById('datalistHolder');
  if(!holder){ holder = document.createElement('div'); holder.id = 'datalistHolder'; document.body.appendChild(holder); }
  holder.innerHTML = html;
}
function refreshEmployeeLists(){renderDatalists()}
function parseEmployeeInput(value){
  const raw = String(value || '').trim();
  if(!raw) return null;
  const exactOption = employees.find(e => e.active !== false && employeeOptionValue(e) === raw);
  if(exactOption) return exactOption;
  const nameMatches = employees.filter(e => e.active !== false && String(e.name) === raw);
  return nameMatches.length === 1 ? nameMatches[0] : null;
}
function addShiftWorker(type,data={}){
  // Render updated datalists before adding
  renderDatalists();
  const container = document.getElementById(type + 'Container');
  // assign running index based on role
  let id;
  if(type === 'bar') id = barIdx++;
  else if(type === 'waiter') id = waiterIdx++;
  else if(type === 'host') id = hostIdx++;
  else id = managerIdx++;
  const emp = data.empUid ? getEmployeeByKey(data.empUid) : (data.empId ? getEmployeeById(data.empId) : null);
  const value = emp ? employeeOptionValue(emp) : (data.nameSnapshot || data.name || '');
  // Determine stars for bar/waiter roles
  let stars = data.stars || emp?.defaultStars || 6;
  const hasStars = data.hasStars || (stars !== 6);
  // build HTML for star section only for bar/waiter
  const starSection = (type === 'bar' || type === 'waiter') ? `

      </div>
      <div class="worker-actions"><button class="btn icon danger" aria-label="מחק עובד" onclick="this.closest('.worker-card').remove()">×</button></div>

function applyEmployeeDefaults(type,id){const input=document.getElementById(`${type}Emp${id}`);const emp=parseEmployeeInput(input.value);if(!emp)return;const has=document.getElementById(`${type}HasStars${id}`);const options=document.getElementById(`${type}StarsOptions${id}`);const star=Number(emp.defaultStars)||6;if(star!==6&&has&&options){has.checked=true;options.style.display='flex'}document.querySelectorAll(`input[name="${type}Stars${id}"]`).forEach(r=>r.checked=Number(r.value)===star)}
function toggleStars(type,id){const box=document.getElementById(`${type}StarsOptions${id}`);box.style.display=getComputedStyle(box).display==='none'?'flex':'none'}
function getShiftWorkers(type,strict=false){
  const rows=[...document.querySelectorAll(`#${type}Container .worker-card`)];
  const out=[];
  const errors=[];
  rows.forEach((row,i)=>{
    const input=row.querySelector(`input[data-worker-role="${type}"]`);
    const emp=parseEmployeeInput(input?.value);
    let hours=Number(row.querySelector(`input[id^='${type}Hours']`)?.value||0);
    hours=Math.min(Math.max(hours,0),24);
    if(!input?.value.trim()&&!hours)return;
    if(!emp){errors.push(`${roleText(type)||'עובד'} ${i+1}: עובד לא קיים ברשימת העובדים או שהשם כפול`);return}
    if(hours<=0){errors.push(`${emp.name}: חסרות שעות`);return}
    let stars=(type==='bar'||type==='waiter')?(emp.defaultStars||6):6;
    const has=row.querySelector(`input[id^='${type}HasStars']`)?.checked;
    if(has){const sel=row.querySelector(`input[name^='${type}Stars']:checked`);if(sel)stars=Number(sel.value)}
    out.push({role:type,empUid:employeeKey(emp),empId:emp.id||'',name:emp.name,nameSnapshot:emp.name,hours,stars});
  });
  const dup=new Set();
  const seen=new Set();
  out.forEach(w=>{const key=w.role+'|'+(w.empUid||w.empId||w.name);if(seen.has(key))dup.add(w.name);seen.add(key)});
  if(dup.size)errors.push('עובד מופיע פעמיים באותו תפקיד: '+[...dup].join(', '));
  if(strict&&errors.length)throw new Error(errors.join('\n'));
  return {workers:out,errors};
}

function calculate(){
  const totalTip = floorMoney(document.getElementById('totalTip').value || 0);
  const date = document.getElementById('workDate').value || todayISO();
  const isWeekend = document.getElementById('isWeekend').checked;
  const enableBarCut = document.getElementById('enableBarCut').checked;
  const barPct = enableBarCut ? (isWeekend ? BAR_WEEKEND : BAR_WEEK) : 0;
  // Collect workers for each role
  const barData = getShiftWorkers('bar', false);
  const waiterData = getShiftWorkers('waiter', false);
  const hostData = getShiftWorkers('host', false);
  const managerData = getShiftWorkers('manager', false);
  const errors = [...barData.errors, ...waiterData.errors, ...hostData.errors, ...managerData.errors];
  const waiters = waiterData.workers;
  const bars = barData.workers;
  const hosts = hostData.workers;
  const managers = managerData.workers;
  const waiterHours = waiters.reduce((s, w) => s + w.hours, 0);
  if (totalTip <= 0) errors.push('חסר סה״כ טיפים');
  // Require at least one waiter for distribution; hosts/managers do not count for this validation
  if (waiters.length === 0) errors.push('חסר לפחות מלצר אחד');
  if (errors.length) return { ok: false, errors };
  const barTip = floorMoney(totalTip * barPct);
  const remaining = totalTip - barTip;
  // Determine restaurant percentage based on hourly pay after restaurant cut
  let restPct = 0.15;
  const avgWith = p => (remaining * (1 - p)) / waiterHours;
  if (avgWith(0.20) >= 100) restPct = 0.20;
  else if (avgWith(0.17) >= 90) restPct = 0.17;
  const restCut = floorMoney(remaining * restPct);
  const finalForWaiters = floorMoney(remaining - restCut);
  // Compute pays for waiters
  const effWaiters = waiters.reduce((s, w) => s + w.hours * w.stars, 0);
  const perWaiter = effWaiters ? finalForWaiters / effWaiters : 0;
  const waiterRows = waiters.map(w => ({ ...w, pay: floorMoney(w.hours * w.stars * perWaiter), rate: w.hours ? floorMoney((w.hours * w.stars * perWaiter) / w.hours) : 0 }));
  // Compute pays for bartenders
  const effBar = bars.reduce((s, w) => s + w.hours * w.stars, 0);
  const perBar = effBar ? barTip / effBar : 0;
  const barRows = bars.map(w => ({ ...w, pay: floorMoney(w.hours * w.stars * perBar), rate: w.hours ? floorMoney((w.hours * w.stars * perBar) / w.hours) : 0 }));
  // Hosts and managers do not receive tips; assign zero pay and rate
  const hostRows = hosts.map(w => ({ ...w, pay: 0, rate: 0 }));
  const managerRows = managers.map(w => ({ ...w, pay: 0, rate: 0 }));
  const avgHourly = waiterHours ? finalForWaiters / waiterHours : 0;
  return {
    ok: true,
    date,
    totalTip,
    isWeekend,
    enableBarCut,
    barPct,
    barTip,
    restPct,
    restCut,
    finalForWaiters,
    avgHourly: floorMoney(avgHourly),
    waiterHours: roundMoney(waiterHours),
    barHours: roundMoney(bars.reduce((s, w) => s + w.hours, 0)),
    hostHours: roundMoney(hosts.reduce((s, w) => s + w.hours, 0)),
    managerHours: roundMoney(managers.reduce((s, w) => s + w.hours, 0)),
    waiters: waiterRows.sort((a, b) => b.pay - a.pay),
    bars: barRows.sort((a, b) => b.pay - a.pay),
    hosts: hostRows.sort((a, b) => b.hours - a.hours),
    managers: managerRows.sort((a, b) => b.hours - a.hours)
  };
}
function calculateAndRender(scroll=false){const calc=calculate();if(!calc.ok){toast(calc.errors[0]);return null}lastCalculation=calc;renderResults(calc);if(scroll)document.getElementById('calcResults').scrollIntoView({behavior:'smooth',block:'start'});return calc}
function renderResults(c){
  // Show results container (sticky summary removed to avoid duplication)
  document.getElementById('calcResults').classList.remove('hidden');
  // Build macro KPI grid in requested order: total tip, bar cut, restaurant cut, net waiters, average hourly, then hours per role
  document.getElementById('resultsMacro').innerHTML = `

function renderResultCards(rows, avg){
  if (!rows.length) return '<div class="empty">אין נתונים.</div>';
  return rows.map(r => {
    const cls = avg > 0 ? (r.rate >= avg * 1.10 ? 'outlier-high' : (r.rate <= avg * 0.90 ? 'outlier-low' : '')) : '';
    // Determine if stars should be shown; hosts and managers do not have star ratings
    const showStars = !(r.role === 'host' || r.role === 'manager');
    // Determine icon based on role for visual context
    const roleIcons = { waiter:'🧑‍🍳', bar:'🍸', host:'💁‍♀️', manager:'👔' };
    const icon = roleIcons[r.role] || '';
    return `
      <div class="result-card ${cls}">
        <div class="name">${escapeHTML(r.name)}<span class="icon">${icon}</span> <span class="muted">${escapeHTML(r.empId)}</span></div>
        <div class="metric big"><span>שעות</span><b>${r.hours}</b></div>
        ${showStars ? `<div class="metric"><span>כוכבים</span><b>${r.stars}</b></div>` : ''}
        <div class="metric"><span>ש״ש</span><b>${fmt(r.rate)}</b></div>
        <div class="metric big"><span>סכום</span><b>${fmt(r.pay)}</b></div>
      </div>
    `;
  }).join('');
}

function buildDayRecord(calc,idOverride=null,copyNo=0){return {id:idOverride||cryptoId(),date:calc.date,copyNo,locked:true,createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),editCount:0,totalTip:calc.totalTip,isWeekend:calc.isWeekend,enableBarCut:calc.enableBarCut,barPct:calc.barPct,barTip:calc.barTip,restPct:calc.restPct,restCut:calc.restCut,finalForWaiters:calc.finalForWaiters,avgHourly:calc.avgHourly,waiterHours:calc.waiterHours,barHours:calc.barHours,hostHours:calc.hostHours,managerHours:calc.managerHours,workers:[...calc.waiters.map(w=>({...w,role:'waiter'})),...calc.bars.map(w=>({...w,role:'bar'})),...calc.hosts.map(w=>({...w,role:'host'})),...calc.managers.map(w=>({...w,role:'manager'}))]}}
function saveDay(){const calc=calculateAndRender(false);if(!calc)return;const month=monthOfDate(calc.date);if(isMonthClosed(month)){toast('החודש סגור לעריכה');return}let existing=days.find(d=>d.date===calc.date&&d.id!==loadedDayId);let id=loadedDayId;let copyNo=0;if(existing){const answer=prompt('כבר קיים יום שמור לתאריך הזה. כתוב: דרוס / עותק / בטל','בטל');if(!answer||answer==='בטל')return;if(answer==='דרוס'){id=existing.id}else if(answer==='עותק'){copyNo=days.filter(d=>d.date===calc.date).length}else{toast('פעולה בוטלה');return}}const old=id?days.find(d=>d.id===id):null;const record=buildDayRecord(calc,id,copyNo);if(old){record.createdAt=old.createdAt;record.editCount=(old.editCount||0)+1;days=days.map(d=>d.id===id?record:d)}else{days.push(record)}days.sort((a,b)=>String(a.date).localeCompare(String(b.date)));saveJson(LS_DAYS,days);loadedDayId=record.id;lastCalculation=calc;renderDays();renderMonth();updateEditStatus();toast('היום נשמר')}

function makeMonthMacro(md){return md.reduce((a,d)=>({days:a.days+1,totalTip:a.totalTip+Number(d.totalTip||0),finalForWaiters:a.finalForWaiters+Number(d.finalForWaiters||0),barTip:a.barTip+Number(d.barTip||0),restCut:a.restCut+Number(d.restCut||0),waiterHours:a.waiterHours+Number(d.waiterHours||0),barHours:a.barHours+Number(d.barHours||0),hostHours:a.hostHours+Number(d.hostHours??(d.workers||[]).filter(w=>w.role==='host').reduce((s,w)=>s+Number(w.hours||0),0)),managerHours:a.managerHours+Number(d.managerHours??(d.workers||[]).filter(w=>w.role==='manager').reduce((s,w)=>s+Number(w.hours||0),0))}),{days:0,totalTip:0,finalForWaiters:0,barTip:0,restCut:0,waiterHours:0,barHours:0,hostHours:0,managerHours:0})}
function monthWorkerSummary(md,role='all'){const map=new Map();md.forEach(d=>(d.workers||[]).forEach(w=>{if(role!=='all'&&w.role!==role)return;const key=(w.empUid||w.empId||w.nameSnapshot||w.name)+'|'+w.role;if(!map.has(key)){const emp=getEmployeeByKey(w.empUid)||getEmployeeById(w.empId);map.set(key,{empUid:w.empUid||'',empId:w.empId||'',name:emp?.name||w.nameSnapshot||w.name,role:w.role,hours:0,pay:0,days:new Set()})}const item=map.get(key);item.hours+=Number(w.hours||0);item.pay+=Number(w.pay||0);item.days.add(d.date)}));return [...map.values()]}
function renderAlerts(md){const alerts=buildAlerts(md);document.getElementById('monthAlerts').innerHTML=alerts.length?`<div class="divider"></div><h3>בדיקת חודש</h3>${alerts.map(a=>`<div class="alert-card"><b class="${a.level==='err'?'danger-text':'warn-text'}">${escapeHTML(a.title)}</b><div class="muted">${escapeHTML(a.detail)}</div></div>`).join('')}`:'<div class="alert-card"><b class="ok-text">לא נמצאו חריגות משמעותיות</b></div>'}
function buildAlerts(md){
  const alerts=[];
  const byDate={};
  md.forEach(d=>{
    byDate[d.date]=(byDate[d.date]||0)+1;
    // No tip total on this day
    if(!d.totalTip) alerts.push({level:'err',title:'יום עם 0 טיפים',detail:d.date});
    // Missing waiters on this day
    if(!d.workers.some(w=>w.role==='waiter')) alerts.push({level:'err',title:'יום ללא מלצרים',detail:d.date});
    // Missing bartenders on this day
    if(!d.workers.some(w=>w.role==='bar')) alerts.push({level:'warn',title:'יום ללא ברמנים',detail:d.date});
    // Hourly rate out of reasonable range
    if(d.avgHourly>180 || d.avgHourly<30) alerts.push({level:'warn',title:'ש״ש חריג',detail:`${d.date} · ${fmt(d.avgHourly)}`});
    // Check each worker
    d.workers.forEach(w=>{
      // Employee ID is optional; do not alert on missing employee ID
      // Only alert for zero hours
      if(!w.hours) alerts.push({level:'warn',title:'עובד עם 0 שעות',detail:`${d.date} · ${w.name}`});
    });
  });
  // Look for duplicate dates
  Object.entries(byDate).forEach(([date,count])=>{
    if(count>1) alerts.push({level:'err',title:'כפילות תאריך',detail:`${date} · ${count} רשומות`});
  });
  return alerts;
}
function toggleMonthClosed(){const m=document.getElementById('monthPicker').value||monthISO();if(isMonthClosed(m)){if(!confirm('לפתוח את החודש לעריכה?'))return;closedMonths=closedMonths.filter(x=>x.month!==m);toast('החודש נפתח לעריכה')}else{const alerts=buildAlerts(currentMonthDays());if(alerts.some(a=>a.level==='err')&&!confirm('יש חריגות חמורות. לסגור בכל זאת?'))return;closedMonths.push({month:m,closedAt:new Date().toISOString()});toast('החודש נסגר')}saveJson(LS_CLOSED,closedMonths);renderMonth()}
function printMonthReport(){const m=document.getElementById('monthPicker').value||monthISO();const md=currentMonthDays();const macro=makeMonthMacro(md);const workers=monthWorkerSummary(md,'all').sort((a,b)=>String(a.name).localeCompare(String(b.name),'he'));const alerts=buildAlerts(md);document.getElementById('printArea').innerHTML=`<h1>דוח טיפים חודשי · ${escapeHTML(m)}</h1><div class="print-grid"><div>ימי פעילות: <b>${macro.days}</b></div><div>סה״כ טיפים: <b>${fmt(macro.totalTip)}</b></div><div>נטו מלצרים: <b>${fmt(macro.finalForWaiters)}</b></div><div>לבר: <b>${fmt(macro.barTip)}</b></div><div>למסעדה: <b>${fmt(macro.restCut)}</b></div><div>שעות מלצרים: <b>${roundMoney(macro.waiterHours)}</b></div><div>שעות ברמנים: <b>${roundMoney(macro.barHours)}</b></div><div>שעות מארחות: <b>${roundMoney(macro.hostHours)}</b></div><div>שעות אחמ״שים: <b>${roundMoney(macro.managerHours)}</b></div></div><h2>פירוט עובדים</h2>${workers.map(w=>`<div class="summary-card"><b>${escapeHTML(w.name)} · ${escapeHTML(w.empId)} · ${roleText(w.role)}</b><div>שעות: ${roundMoney(w.hours)} · טיפים: ${fmt(w.pay)} · ש״ש: ${fmt(w.hours?w.pay/w.hours:0)}</div></div>`).join('')}<h2>חריגות</h2>${alerts.length?alerts.map(a=>`<div>${escapeHTML(a.title)} · ${escapeHTML(a.detail)}</div>`).join(''):'<div>לא נמצאו חריגות.</div>'}`;window.print()}

function toCsv(rows){return rows.map(r=>r.map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(',')).join('\n')}
function downloadText(filename,text,type='text/plain;charset=utf-8'){const blob=new Blob([text],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();URL.revokeObjectURL(a.href)}
function exportAllDaysCsv(){const rows=[['date','copy','role','employee_uid','employee_id','name','hours','stars','pay','rate','total_tip','avg_hourly']];days.forEach(d=>(d.workers||[]).forEach(w=>rows.push([d.date,d.copyNo||0,w.role,w.empUid||'',w.empId,w.nameSnapshot||w.name,w.hours,w.stars,w.pay,w.rate,d.totalTip,d.avgHourly])));downloadText('tip_journal.csv','\ufeff'+toCsv(rows),'text/csv;charset=utf-8')}
function exportMonthCsv(){const m=document.getElementById('monthPicker').value||monthISO();const rows=[['month','role','employee_uid','employee_id','name','hours','pay','avg_rate','days']];monthWorkerSummary(currentMonthDays(),'all').forEach(w=>rows.push([m,w.role,w.empUid||'',w.empId,w.name,roundMoney(w.hours),floorMoney(w.pay),floorMoney(w.hours?w.pay/w.hours:0),w.days.size]));downloadText(`tip_month_${m}.csv`,'\ufeff'+toCsv(rows),'text/csv;charset=utf-8')}
function exportAlertsCsv(){const m=document.getElementById('monthPicker').value||monthISO();const rows=[['month','level','title','detail']];buildAlerts(currentMonthDays()).forEach(a=>rows.push([m,a.level,a.title,a.detail]));downloadText(`tip_alerts_${m}.csv`,'\ufeff'+toCsv(rows),'text/csv;charset=utf-8')}
function exportBackupJson(){const backup={version:5,exportedAt:new Date().toISOString(),employees,days,closedMonths};downloadText(`tipcalc_backup_${new Date().toISOString().slice(0,10)}.json`,JSON.stringify(backup,null,2),'application/json;charset=utf-8')}
function previewImportFile(event){const file=event.target.files?.[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);if(!Array.isArray(data.employees)||!Array.isArray(data.days))throw new Error('bad');pendingImport=data;const months=[...new Set(data.days.map(d=>monthOfDate(d.date)).filter(Boolean))].join(', ');document.getElementById('importPreview').innerHTML=`<div class="alert-card"><b>תצוגה מקדימה</b><div class="muted">עובדים: ${data.employees.length} · ימים: ${data.days.length} · חודשים: ${escapeHTML(months||'אין')}</div><div class="row" style="margin-top:10px"><button class="btn secondary" onclick="applyImport('merge')">מזג עם הקיים</button><button class="btn danger" onclick="applyImport('replace')">החלף הכול</button><button class="btn secondary" onclick="clearImportPreview()">בטל</button></div></div>`}catch{toast('קובץ גיבוי לא תקין')}};reader.readAsText(file)}
function applyImport(mode){if(!pendingImport)return;if(mode==='replace'&&!confirm('להחליף את כל הנתונים הקיימים?'))return;if(mode==='replace'){employees=pendingImport.employees||[];days=pendingImport.days||[];closedMonths=pendingImport.closedMonths||[]}else{const empMap=new Map(employees.map(e=>[employeeKey(e),e]));(pendingImport.employees||[]).forEach(e=>{const key=employeeKey(e)||String(e.id||e.name||employeeUid());empMap.set(key,{...empMap.get(key),...e})});employees=[...empMap.values()];const dayMap=new Map(days.map(d=>[String(d.id),d]));(pendingImport.days||[]).forEach(d=>dayMap.set(String(d.id),d));days=[...dayMap.values()];const monthMap=new Map(closedMonths.map(m=>[m.month,m]));(pendingImport.closedMonths||[]).forEach(m=>monthMap.set(m.month,m));closedMonths=[...monthMap.values()]}migrateData();persist();pendingImport=null;clearImportPreview();refreshEmployeeLists();renderEmployees();renderDays();renderMonth();toast('הייבוא הושלם')}
function clearImportPreview(){pendingImport=null;document.getElementById('importPreview').innerHTML='';document.getElementById('backupFile').value=''}
</script>
